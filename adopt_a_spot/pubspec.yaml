name: adopt_a_spot
description: SpotSeva — Gamified civic maintenance platform for citizens and municipalities.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ────────────────────────────────────────────────────
  firebase_core:               ^3.3.0
  firebase_auth:               ^5.1.2
  cloud_firestore:             ^5.2.0
  firebase_storage:            ^12.1.2
  cloud_functions:             ^5.6.2
  firebase_messaging:          ^15.1.0
  firebase_analytics:          ^11.2.0

  # ── State management ────────────────────────────────────────────
  flutter_bloc:                ^8.1.6
  equatable:                   ^2.0.5
  dartz:                       ^0.10.1

  # ── Maps & location (OpenStreetMap) ────────────────────────────
  flutter_map:                 ^8.0.0
  flutter_map_cancellable_tile_provider: ^3.1.0
  latlong2:                    ^0.9.1
  flutter_map_marker_cluster:  ^8.2.2
  geolocator:                  ^13.0.1
  permission_handler:          ^11.3.1

  # ── Camera & media ─────────────────────────────────────────────
  image_picker:                ^1.1.2
  cached_network_image:        ^3.3.1
  flutter_image_compress:      ^2.3.0
  photo_view:                  ^0.15.0

  # ── DI & routing ───────────────────────────────────────────────
  get_it:                      ^8.0.2
  go_router:                   ^14.2.7

  # ── UI & animation ─────────────────────────────────────────────
  lottie:                      ^3.1.2
  flutter_animate:             ^4.5.0
  shimmer:                     ^3.0.0
  badges:                      ^3.1.2
  fl_chart:                    ^0.68.0
  qr_flutter:                  ^4.1.0
  google_fonts:                ^6.2.1

  # ── HTTP ────────────────────────────────────────────────────────
  http:                        ^1.2.1

  # ── Utils ───────────────────────────────────────────────────────
  intl:                        ^0.19.0
  timeago:                     ^3.7.0
  uuid:                        ^4.4.2
  logger:                      ^2.4.0
  connectivity_plus:           ^6.0.5
  shared_preferences:          ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:               ^4.0.0
  bloc_test:                   ^9.1.7
  mocktail:                    ^1.0.4
  build_runner:                ^2.4.12

flutter:
  uses-material-design: true
