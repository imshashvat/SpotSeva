name: spotseva_dashboard
description: SpotSeva Municipal Command Centre — Flutter Web dashboard for municipal officers.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core:      ^3.3.0
  firebase_auth:      ^5.1.2
  cloud_firestore:    ^5.2.0
  firebase_messaging: ^15.1.0

  # State
  flutter_bloc:       ^8.1.6
  equatable:          ^2.0.5

  # Maps (OSM for heatmap)
  flutter_map:        ^7.0.2
  latlong2:           ^0.9.1

  # Charts
  fl_chart:           ^0.68.0

  # UI
  google_fonts:       ^6.2.1
  shimmer:            ^3.0.0
  timeago:            ^3.7.0
  intl:               ^0.19.0

  # Routing
  go_router:          ^14.2.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
